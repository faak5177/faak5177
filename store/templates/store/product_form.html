{% extends 'store/base.html' %}
{% load static %}
{% block title %}__LBRC__ action __RBRC__ товара{% endblock %}
{% block content %}
<a class="btn btn-back" href="{% url 'product_list' %}">← Назад</a>
<h2 style="color:#B8860B;">__LBRC__ action __RBRC__ товара</h2>
<form method="post" enctype="multipart/form-data" style="max-width:560px; background:#fff; padding:18px; border-radius:6px;">{% csrf_token %}
  <label>Артикул</label>
  <input type="text" name="article" value="__LBRC__ product.article|default:next_article __RBRC__" {% if product %}readonly{% endif %}>
  <label>Наименование</label>
  <input type="text" name="name" value="__LBRC__ product.name|default_if_none:'' __RBRC__" required>
  <label>Ед. измерения</label>
  <input type="text" name="number_measure" value="__LBRC__ product.number_measure|default:'шт' __RBRC__" required>
  <label>Цена, ₽</label>
  <input type="number" step="0.01" name="price" value="__LBRC__ product.price|default:0 __RBRC__" required>
  <label>Категория</label>
  <select name="category_id" required>{% for c in categories %}<option value="__LBRC__ c.id __RBRC__" {% if product and product.category_id == c.id %}selected{% endif %}>__LBRC__ c.name __RBRC__</option>{% endfor %}</select>
  <label>Производитель</label>
  <select name="manufacturer_id" required>{% for m in manufacturers %}<option value="__LBRC__ m.id __RBRC__" {% if product and product.manufacturer_id == m.id %}selected{% endif %}>__LBRC__ m.name __RBRC__</option>{% endfor %}</select>
  <label>Поставщик</label>
  <select name="supplier_id" required>{% for s in suppliers %}<option value="__LBRC__ s.id __RBRC__" {% if product and product.supplier_id == s.id %}selected{% endif %}>__LBRC__ s.name __RBRC__</option>{% endfor %}</select>
  <label>Скидка, %</label>
  <input type="number" step="0.01" name="discount" value="__LBRC__ product.discount|default:0 __RBRC__">
  <label>Количество</label>
  <input type="number" name="quantity" value="__LBRC__ product.quantity|default:0 __RBRC__">
  <label>Описание</label>
  <textarea name="description" rows="3">__LBRC__ product.description|default_if_none:'' __RBRC__</textarea>
  <label>Фото (автомасштаб до 300×200)</label>
  <input type="file" name="photo" accept="image/*">
  {% if product.photo %}<div style="margin-top:6px;"><img src="{% static 'uploads/' %}__LBRC__ product.photo __RBRC__" width="150"></div>{% endif %}
  <div style="margin-top:16px; display:flex; gap:8px;">
    <button class="btn" type="submit">Сохранить</button>
    <a class="btn btn-back" href="{% url 'product_list' %}">Отмена</a>
  </div>
</form>
{% endblock %}
